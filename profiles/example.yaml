provider:
  type: vertex
  region: global

claude_md: templates/example/CLAUDE.md

mcp_servers:
  - name: context-mode
    type: npx
    package: context-mode

skills:
  - templates/example/skills/review.md

hooks:
  PreToolUse:
    - matcher: Bash
      command: "echo 'Hook: pre-tool-use check'"

project_template:
  claude_md: templates/example/project-CLAUDE.md
  settings:
    permissions:
      deny:
        - "Bash(rm -rf *)"
  commands:
    - templates/example/commands/commit.md
  rules:
    - templates/example/rules/api-conventions.md
